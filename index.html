<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">
<title>Customer Records</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0f0f0f; color:#e0e0e0;
    font-family:Arial,sans-serif; padding:16px; min-height:100vh;
  }

  /* ══ LOGIN ══════════════════════════════════ */
  .login-container {
    display:flex; justify-content:center;
    align-items:center; min-height:90vh;
  }
  .login-box {
    background:#1a1a2e; border:1px solid #2a2a4a;
    border-radius:14px; padding:36px 28px;
    width:100%; max-width:380px; text-align:center;
  }
  .lock-icon { font-size:52px; margin-bottom:14px; }
  .login-box h2 {
    color:#7eb8f7; font-size:19px;
    margin-bottom:6px; letter-spacing:1px;
  }
  .login-box .subtitle { color:#555; font-size:12px; margin-bottom:26px; }
  .login-box input {
    width:100%; background:#0f0f1a; border:1px solid #2a2a4a;
    border-radius:8px; padding:13px 16px; color:#e0e0e0;
    font-size:16px; text-align:center; letter-spacing:4px;
    font-family:monospace; outline:none; margin-bottom:14px;
    transition:border-color 0.2s;
  }
  .login-box input:focus { border-color:#7eb8f7; }
  .login-box input::placeholder { color:#333; letter-spacing:1px; font-size:13px; }
  .login-btn {
    width:100%; background:#1e3a5f; color:#7eb8f7;
    border:1px solid #2a5a8f; border-radius:8px; padding:13px;
    font-size:14px; font-weight:bold; cursor:pointer;
    letter-spacing:1px; transition:background 0.15s;
  }
  .login-btn:hover  { background:#2a4a6f; }
  .login-btn:active { background:#0e2a4f; }
  .login-error {
    color:#ff5555; font-size:12px; margin-top:14px; display:none;
    padding:8px; background:#2a1010; border-radius:6px;
    border:1px solid #4a2020;
  }
  .login-hint { color:#333; font-size:11px; margin-top:18px; line-height:1.7; }

  /* ══ DASHBOARD ══════════════════════════════ */
  .dashboard { display:none; }
  .header {
    background:#1a1a2e; border:1px solid #2a2a4a; border-radius:10px;
    padding:16px 20px; margin-bottom:20px; display:flex;
    justify-content:space-between; align-items:center;
    flex-wrap:wrap; gap:10px;
  }
  .header h1 { font-size:18px; color:#7eb8f7; letter-spacing:1px; }
  .header .updated { font-size:12px; color:#555; margin-top:4px; }
  .mode-badge {
    font-size:11px; margin-top:5px; padding:3px 10px; border-radius:4px;
    display:inline-block; font-weight:bold; letter-spacing:0.5px;
  }
  .mode-master   { background:#0a2a0a; color:#4caf50; border:1px solid #1a4a1a; }
  .mode-cost     { background:#2a1a3a; color:#c77dff; border:1px solid #4a2a6a; }
  .mode-customer { background:#3a2a00; color:#f0a500; border:1px solid #5a4000; }
  .btn-group { display:flex; gap:8px; flex-wrap:wrap; }
  .refresh-btn, .logout-btn {
    border-radius:6px; padding:8px 16px; font-size:13px; cursor:pointer;
    text-decoration:none; display:inline-block; border:1px solid; font-weight:bold;
  }
  .refresh-btn { background:#1e3a5f; color:#7eb8f7; border-color:#2a5a8f; }
  .logout-btn  { background:#3a1a1a; color:#ff5555; border-color:#5a2a2a; }
  .refresh-btn:hover  { background:#2a4a6f; }
  .logout-btn:hover   { background:#4a2a2a; }
  .refresh-btn:active { background:#0e2a4f; }
  .logout-btn:active  { background:#2a1010; }

  /* ══ TABLE ══════════════════════════════════ */
  .table-wrap { overflow-x:auto; border-radius:10px; border:1px solid #2a2a2a; }
  table { width:100%; border-collapse:collapse; min-width:700px; font-size:13px; }
  thead tr {
    background:#1a1a2e; color:#7eb8f7;
    text-transform:uppercase; font-size:11px; letter-spacing:0.5px;
  }
  thead th {
    padding:12px 14px; text-align:left;
    border-bottom:1px solid #2a2a4a; white-space:nowrap;
  }
  tbody tr { border-bottom:1px solid #1a1a1a; transition:background 0.15s; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background:#161616; }
  tbody td { padding:11px 14px; vertical-align:middle; }

  .code {
    font-family:monospace; font-size:13px;
    color:#f0a500; font-weight:bold; letter-spacing:1px;
  }
  .date   { color:#666; font-size:12px; white-space:nowrap; }
  .name   { color:#e0e0e0; font-weight:500; }
  .phone  { color:#888; font-size:12px; }
  .model  { color:#ccc; }
  .issue  { color:#bbb; }
  .amount      { font-family:monospace; color:#7eb8f7; }
  .cost-amount { font-family:monospace; color:#c77dff; }
  .partner-badge {
    background:#0a2a0a; color:#4caf50; border:1px solid #1a4a1a;
    border-radius:4px; padding:2px 8px; font-size:11px;
    white-space:nowrap; font-weight:bold;
  }
  .status-pending {
    background:#3a2a00; color:#f0a500; border:1px solid #5a4000;
    border-radius:12px; padding:3px 10px;
    font-size:11px; font-weight:bold; white-space:nowrap;
  }
  .status-done {
    background:#0a2a0a; color:#4caf50; border:1px solid #1a4a1a;
    border-radius:12px; padding:3px 10px;
    font-size:11px; font-weight:bold; white-space:nowrap;
  }
  .status-returned {
    background:#1a1a3a; color:#7eb8f7; border:1px solid #2a2a5a;
    border-radius:12px; padding:3px 10px;
    font-size:11px; font-weight:bold; white-space:nowrap;
  }
  .status-collected {
    background:#1a2a3a; color:#00bcd4; border:1px solid #2a4a5a;
    border-radius:12px; padding:3px 10px;
    font-size:11px; font-weight:bold; white-space:nowrap;
  }

  /* ══ GROUP DIVIDER ══════════════════════════ */
  .group-divider td {
    background:#111; color:#444; font-size:10px;
    text-transform:uppercase; letter-spacing:2px;
    padding:6px 14px; text-align:center;
    border-bottom:1px solid #1a1a1a;
  }

  .empty { text-align:center; padding:40px; color:#444; font-size:14px; }
  .na    { color:#444; font-size:12px; }

  /* ══ CUSTOMER CARD ══════════════════════════ */
  .card-wrap { max-width:480px; margin:0 auto; }
  .record-card {
    background:#1a1a2e; border:1px solid #2a2a4a;
    border-radius:14px; padding:24px; overflow:hidden;
  }
  .card-header {
    text-align:center; margin-bottom:20px;
    padding-bottom:16px; border-bottom:1px solid #2a2a4a;
  }
  .card-header .card-icon { font-size:36px; margin-bottom:8px; }
  .card-header h3 {
    color:#7eb8f7; font-size:15px;
    letter-spacing:1px; text-transform:uppercase;
  }
  .card-row {
    display:flex; justify-content:space-between;
    align-items:center; padding:10px 0;
    border-bottom:1px solid #1a1a2a; gap:12px;
  }
  .card-row:last-child { border-bottom:none; }
  .card-label {
    color:#555; font-size:11px;
    text-transform:uppercase; letter-spacing:0.8px; flex-shrink:0;
  }
  .card-value {
    color:#e0e0e0; font-size:13px;
    text-align:right; word-break:break-word;
  }
</style>
</head>
<body autocomplete="off">

<!-- ══ LOGIN ══ -->
<div class="login-container" id="loginScreen">
  <div class="login-box">
    <div class="lock-icon">&#128274;</div>
    <h2>Customer Records</h2>
    <div class="subtitle">Enter your access code to continue</div>
    <input
      type="password"
      id="codeInput"
      placeholder="Enter code..."
      autocomplete="new-password"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      data-form-type="other"
      readonly
      onfocus="this.removeAttribute('readonly')"
      onkeydown="if(event.key==='Enter')doLogin()"
    >
    <button class="login-btn" onclick="doLogin()">
      &#128275;&nbsp; ACCESS
    </button>
    <div class="login-error" id="loginError"></div>
    <div class="login-hint">
      Master password &rarr; Full records<br>
      Device code &rarr; Your device status
    </div>
  </div>
</div>

<!-- ══ DASHBOARD ══ -->
<div class="dashboard" id="dashboard">
  <div class="header">
    <div>
      <h1>&#128188; Customer Records</h1>
      <div class="updated">Updated: 2026-04-14 11:08:24 PM</div>
      <div class="mode-badge" id="modeBadge"></div>
    </div>
    <div class="btn-group">
      <button class="refresh-btn" onclick="doRefresh()">&#8635; Refresh</button>
      <button class="logout-btn"  onclick="doLogout()">🚪 Logout</button>
    </div>
  </div>

  <div id="masterView" style="display:none;">
    <div class="table-wrap">
      <table>
        <thead><tr id="tableHead"></tr></thead>
        <tbody id="masterBody"></tbody>
      </table>
    </div>
  </div>

  <div id="customerView" style="display:none;">
    <div class="card-wrap">
      <div class="record-card" id="customerCard"></div>
    </div>
  </div>
</div>

<script>
const MASTER_HASH = "7c180e3e3bee93dde4c28a4999b4cc3604ee53524c3b245485d41ac36d478c82";
const COST_HASH   = "feefd29796462ae3bb2e0e50ff4392f7dbd943960c3df621b450f3d786582733";
const records     = [{"code":"E3O5M","date":"2026-04-13 10:31 PM","name":"jumma khan","phone":"N/A","model":"oppo red","issue":"charging strip","adv":"0","tot":"700","cost":"350","stat":"P"},{"code":"D9D0I","date":"2026-04-14 08:08 PM","name":"zohaib","phone":"N/A","model":"nokia TA-1017","issue":"lcd light water damage","adv":"0","tot":"300","cost":"0","stat":"D"},{"code":"E1D3Q","date":"2026-04-10 02:40 PM","name":"N/A","phone":"N/A","model":"tecno bg6","issue":"panel","adv":"0","tot":"3000","cost":"1800","stat":"D"},{"code":"I9M5V","date":"2026-04-06 06:30 PM","name":"N/A","phone":"N/A","model":"china keypad green blue","issue":"lcd","adv":"0","tot":"500","cost":"250","stat":"D"},{"code":"F9G2L","date":"2026-03-28 07:30 PM","name":"N/A","phone":"03488690661","model":"huawei y9 2019","issue":"panel","adv":"0","tot":"3500","cost":"1900","stat":"D"},{"code":"M1J7B","date":"2026-04-13 11:55 AM","name":"sajid","phone":"N/A","model":"vivo blue white","issue":"battery replacement","adv":"0","tot":"1500","cost":"0","stat":"C"},{"code":"Q3F0R","date":"2026-04-12 11:22 AM","name":"murtaza","phone":"N/A","model":"infinix x6881","issue":"panel LCD","adv":"PARTNER","tot":"PARTNER","cost":"0","stat":"C"},{"code":"K4A8I","date":"2026-04-12 10:05 PM","name":"jameel biryani","phone":"N/A","model":"infinx","issue":"speaker change + sensor call issues + camera clean","adv":"0","tot":"500","cost":"0","stat":"C"},{"code":"B3O6Z","date":"2026-04-12 01:10 PM","name":"N/A","phone":"N/A","model":"infinix x653c","issue":"backcover&power button&charging strips","adv":"500","tot":"1500","cost":"800","stat":"C"},{"code":"R1K2C","date":"2026-04-11 03:27 PM","name":"murtaza","phone":"N/A","model":"samsung","issue":"back cover","adv":"PARTNER","tot":"PARTNER","cost":"0","stat":"C"},{"code":"B9N9J","date":"2026-04-11 03:26 PM","name":"N/A","phone":"N/A","model":"oppo a16 blue","issue":"panel","adv":"2000","tot":"3000","cost":"1650","stat":"C"},{"code":"P2M0T","date":"2026-04-11 03:23 PM","name":"N/A","phone":"N/A","model":"oppo a16 black","issue":"panel","adv":"1000","tot":"3000","cost":"1650","stat":"C"},{"code":"H0U0T","date":"2026-04-11 02:40 PM","name":"N/A","phone":"N/A","model":"vivo","issue":"strip","adv":"0","tot":"800","cost":"350","stat":"C"},{"code":"D1W4U","date":"2026-04-11 02:39 PM","name":"murtaza","phone":"N/A","model":"vivo","issue":"battery & backcover","adv":"PARTNER","tot":"PARTNER","cost":"0","stat":"C"},{"code":"R1G9B","date":"2026-04-11 02:39 PM","name":"murtaza","phone":"N/A","model":"infinix","issue":"panel","adv":"PARTNER","tot":"PARTNER","cost":"0","stat":"C"},{"code":"O5T4S","date":"2026-04-10 09:12 PM","name":"N/A","phone":"N/A","model":"oppo a3x","issue":"panel","adv":"1000","tot":"3000","cost":"2000","stat":"C"},{"code":"R0Y8A","date":"2026-04-13 01:18 PM","name":"murtaza","phone":"N/A","model":"oppo","issue":"panel","adv":"PARTNER","tot":"PARTNER","cost":"0","stat":"R"}];

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
let isLoggedIn  = false;
let currentMode = null;

window.addEventListener('load', function () {
    clearInput();
    showLoginScreen();
    setTimeout(function () {
        const inp = document.getElementById('codeInput');
        inp.removeAttribute('readonly');
        inp.focus();
    }, 150);
});

document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'hidden' && isLoggedIn) {
        forceLogout();
    }
});

window.addEventListener('beforeunload', function () {
    forceLogout();
    clearInput();
});

// ════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════

function clearInput() {
    const inp = document.getElementById('codeInput');
    if (inp) { inp.value = ''; inp.setAttribute('readonly', true); }
}

function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = String(s);
    return d.innerHTML;
}

function statusHtml(s) {
    switch (s) {
        case 'P': return '<span class="status-pending">&#9679; Pending</span>';
        case 'D': return '<span class="status-done">&#10003; Done</span>';
        case 'R': return '<span class="status-returned">&#8617; Returned</span>';
        case 'C': return '<span class="status-collected">&#128666; Collected</span>';
        default:  return '<span class="status-pending">' + escHtml(s) + '</span>';
    }
}

function statusText(s) {
    switch (s) {
        case 'P': return '&#9679; Pending';
        case 'D': return '&#10003; Done';
        case 'R': return '&#8617; Returned';
        case 'C': return '&#128666; Collected';
        default:  return escHtml(s);
    }
}

function amountHtml(v) {
    if (v === 'PARTNER') return '<span class="partner-badge">PARTNER</span>';
    return '<span class="amount">Rs&nbsp;' + escHtml(v) + '</span>';
}

function costHtml(v, isPartner) {
    if (isPartner) return '<span class="na">N/A</span>';
    if (!v || v === '0' || v === '')
        return '<span class="na">&#8212;</span>';
    return '<span class="cost-amount">Rs&nbsp;' + escHtml(v) + '</span>';
}

function phoneHtml(p) {
    if (p === 'N/A') return '<span class="na">N/A</span>';
    return escHtml(p);
}

async function sha256(msg) {
    const buf = await crypto.subtle.digest(
        'SHA-256', new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf))
        .map(function (b) { return b.toString(16).padStart(2, '0'); }).join('');
}

// ════════════════════════════════════════════
//  SCREEN CONTROL
// ════════════════════════════════════════════

function showLoginScreen() {
    isLoggedIn  = false;
    currentMode = null;
    document.getElementById('loginScreen').style.display   = 'flex';
    document.getElementById('dashboard').style.display     = 'none';
    document.getElementById('masterView').style.display    = 'none';
    document.getElementById('customerView').style.display  = 'none';
    document.getElementById('loginError').style.display    = 'none';
    document.getElementById('loginError').textContent      = '';
    clearInput();
}

function forceLogout() {
    isLoggedIn  = false;
    currentMode = null;
    clearInput();
}

function doLogout() {
    showLoginScreen();
    setTimeout(function () {
        const inp = document.getElementById('codeInput');
        inp.removeAttribute('readonly');
        inp.focus();
    }, 80);
}

function doRefresh() { forceLogout(); location.reload(); }

// ════════════════════════════════════════════
//  LOGIN
// ════════════════════════════════════════════

async function doLogin() {
    const inp   = document.getElementById('codeInput');
    const errEl = document.getElementById('loginError');
    const raw   = inp.value.trim();
    inp.value   = '';

    if (!raw) {
        errEl.style.display = 'block';
        errEl.textContent   = '⚠️  Please enter a code.';
        return;
    }

    const inputHash  = await sha256(raw.toLowerCase());
    const upperInput = raw.toUpperCase();

    if (inputHash === MASTER_HASH) {
        loginSuccess('master', null);
        return;
    }

    if (inputHash === COST_HASH) {
        loginSuccess('cost', null);
        return;
    }

    const found = records.find(function (r) {
        return r.code === upperInput;
    });
    if (found) {
        loginSuccess('customer', found);
        return;
    }

    errEl.style.display = 'block';
    errEl.textContent   = '❌  Invalid code. Please try again.';
    inp.focus();
}

function loginSuccess(mode, record) {
    isLoggedIn  = true;
    currentMode = mode;

    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display   = 'block';

    const badge = document.getElementById('modeBadge');

    if (mode === 'master') {
        badge.className   = 'mode-badge mode-master';
        badge.textContent = 'Marwat Communication';
        document.getElementById('masterView').style.display   = 'block';
        document.getElementById('customerView').style.display = 'none';
        renderMasterTable(false);

    } else if (mode === 'cost') {
        badge.className   = 'mode-badge mode-cost';
        badge.textContent = 'Marwat Communication';
        document.getElementById('masterView').style.display   = 'block';
        document.getElementById('customerView').style.display = 'none';
        renderMasterTable(true);

    } else if (mode === 'customer') {
        badge.className   = 'mode-badge mode-customer';
        badge.textContent = 'Marwat Communication';
        document.getElementById('masterView').style.display   = 'none';
        document.getElementById('customerView').style.display = 'block';
        renderCustomerCard(record);
    }
}

// ════════════════════════════════════════════
//  RENDER — TABLE
//  Records already sorted from server:
//  P → D → C → R, newest first within each group
// ════════════════════════════════════════════

function groupLabel(stat) {
    switch (stat) {
        case 'P': return '🔧 Pending — Work in Progress';
        case 'D': return '✅ Done — Ready for Pickup';
        case 'C': return '📦 Collected — Device Taken';
        case 'R': return '↩️ Returned — Without Repair';
        default:  return stat;
    }
}

function renderMasterTable(showCost) {
    const thead = document.getElementById('tableHead');
    const tbody = document.getElementById('masterBody');
    const cols  = showCost ? 10 : 9;

    let hdr = '<th>Code</th><th>Date &amp; Time</th><th>Name</th>' +
              '<th>Phone</th><th>Model</th><th>Issue</th>' +
              '<th>Advance</th><th>Total</th>';
    if (showCost) hdr += '<th style="color:#c77dff;">Cost</th>';
    hdr += '<th>Status</th>';
    thead.innerHTML = hdr;

    if (!records || records.length === 0) {
        tbody.innerHTML =
            '<tr><td colspan="' + cols +
            '" class="empty">No records found</td></tr>';
        return;
    }

    let html        = '';
    let lastGroup   = null;

    records.forEach(function (r) {
        const isPartner = (r.adv === 'PARTNER');

        // ── Group divider row ──────────────────
        if (r.stat !== lastGroup) {
            lastGroup = r.stat;
            html += '<tr class="group-divider"><td colspan="' + cols + '">' +
                    groupLabel(r.stat) + '</td></tr>';
        }

        html += '<tr>';
        html += '<td><span class="code">'  + escHtml(r.code)    + '</span></td>';
        html += '<td><span class="date">'  + escHtml(r.date)    + '</span></td>';
        html += '<td><span class="name">'  + escHtml(r.name)    + '</span></td>';
        html += '<td><span class="phone">' + phoneHtml(r.phone) + '</span></td>';
        html += '<td><span class="model">' + escHtml(r.model)   + '</span></td>';
        html += '<td><span class="issue">' + escHtml(r.issue)   + '</span></td>';
        html += '<td>'                     + amountHtml(r.adv)  + '</td>';
        html += '<td>'                     + amountHtml(r.tot)  + '</td>';
        if (showCost) {
            html += '<td>' + costHtml(r.cost, isPartner) + '</td>';
        }
        html += '<td>' + statusHtml(r.stat) + '</td>';
        html += '</tr>';
    });

    tbody.innerHTML = html;
}

// ════════════════════════════════════════════
//  RENDER — CUSTOMER CARD
// ════════════════════════════════════════════

function cardRow(label, valueHtml) {
    return '<div class="card-row">' +
           '<span class="card-label">' + label + '</span>' +
           '<span class="card-value">' + valueHtml + '</span>' +
           '</div>';
}

function renderCustomerCard(r) {
    const statClass =
        r.stat === 'P' ? 'status-pending'   :
        r.stat === 'D' ? 'status-done'      :
        r.stat === 'R' ? 'status-returned'  :
        r.stat === 'C' ? 'status-collected' :
                         'status-pending';

    const html =
        '<div class="card-header">' +
        '<div class="card-icon">&#128241;</div>' +
        '<h3>Device Receipt</h3></div>' +
        cardRow('Code',    '<span class="code">' + escHtml(r.code) + '</span>') +
        cardRow('Date',    escHtml(r.date))    +
        cardRow('Name',    escHtml(r.name))    +
        cardRow('Phone',   phoneHtml(r.phone)) +
        cardRow('Model',   escHtml(r.model))   +
        cardRow('Issue',   escHtml(r.issue))   +
        cardRow('Advance', amountHtml(r.adv))  +
        cardRow('Total',   amountHtml(r.tot))  +
        cardRow('Status',
            '<span class="' + statClass + '">' +
            statusText(r.stat) + '</span>');

    document.getElementById('customerCard').innerHTML = html;
}
</script>
</body>
</html>
